<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- 앱 아이콘 배경 (앱 테마 slate-950) -->
  <rect width="512" height="512" rx="104" fill="url(#bg-grad)"/>
  <rect width="512" height="512" rx="104" fill="url(#glow)"/>

  <!-- 헤더 로고 (32×32 원본을 확대 배치) -->
  <g transform="translate(88 88) scale(10.5)">
    <!-- 은은한 후광 스트로크 -->
    <path d="M16 2 L27.5 9 V23 L16 30 L4.5 23 V9 Z" fill="none"
          stroke="url(#logo-grad)" stroke-width="2.2" opacity="0.5" filter="url(#soft)"/>
    <!-- 육각 외곽 -->
    <path d="M16 2 L27.5 9 V23 L16 30 L4.5 23 V9 Z" fill="none"
          stroke="url(#logo-grad)" stroke-width="1.6" stroke-linejoin="round"/>
    <!-- 코어 -->
    <circle cx="16" cy="16" r="4" fill="url(#logo-grad)"/>
    <!-- 꼭짓점 노드 -->
    <circle cx="16"   cy="2"  r="1.4" fill="#67e8f9"/>
    <circle cx="27.5" cy="9"  r="1.4" fill="#67e8f9"/>
    <circle cx="27.5" cy="23" r="1.4" fill="#a78bfa"/>
    <circle cx="16"   cy="30" r="1.4" fill="#a78bfa"/>
    <circle cx="4.5"  cy="23" r="1.4" fill="#a78bfa"/>
    <circle cx="4.5"  cy="9"  r="1.4" fill="#67e8f9"/>
  </g>
</svg>
